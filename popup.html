<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      padding: 12px;
      font-family: "IBM Plex Mono", monospace, monospace;
      background: #0a0a0a;
      color: #e5e5e5;
      font-size: 12px;
    }
    h3 {
      color: #22c55e;
      margin: 0 0 12px;
      font-size: 14px;
      letter-spacing: 0.05em;
    }
    label {
      display: block;
      color: #888;
      font-size: 11px;
      margin-bottom: 4px;
    }
    input[type="text"] {
      width: 100%;
      margin-bottom: 10px;
      padding: 5px 6px;
      background: #1a1a1a;
      color: #e5e5e5;
      border: 1px solid #333;
      border-radius: 3px;
      font-family: inherit;
      font-size: 11px;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #22c55e;
    }
    button {
      background: #22c55e;
      color: #0a0a0a;
      border: none;
      padding: 6px 14px;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
    }
    button:hover { background: #16a34a; }
    #status {
      margin-top: 10px;
      font-size: 11px;
      color: #666;
      min-height: 16px;
    }
    #status.ok { color: #22c55e; }
    #status.err { color: #ef4444; }
    .divider {
      border: none;
      border-top: 1px solid #222;
      margin: 12px 0;
    }
    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #555;
      margin-top: 8px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333;
      display: inline-block;
      margin-right: 4px;
    }
    .dot.active { background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <h3>CFFBRW Bridge</h3>

  <label>Gateway URL</label>
  <input id="gateway" type="text" placeholder="http://localhost:8787">

  <label>API Token (optional)</label>
  <input id="token" type="text" placeholder="wfk_...">

  <button id="save">Save</button>

  <div id="status"></div>

  <button id="compile" style="background:#1a1a1a;color:#22c55e;border:1px solid #22c55e;padding:6px 12px;cursor:pointer;margin-top:8px;width:100%;font-family:inherit;font-size:12px;border-radius:3px">Compile current page</button>
  <div id="schema-result" style="margin-top:8px;font-size:11px;display:none">
    <div style="color:#666">Tool Schema ID:</div>
    <input id="schema-id" readonly style="width:100%;background:#1a1a1a;color:#22c55e;border:1px solid #333;padding:4px;font-size:11px;font-family:inherit;border-radius:3px">
  </div>

  <hr class="divider">

  <div class="info-row">
    <span><span class="dot active" id="poll-dot"></span>Polling every 2s</span>
    <span id="last-poll" style="color:#444">—</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
