<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      padding: 12px;
      font-family: "IBM Plex Mono", monospace, monospace;
      background: #0a0a0a;
      color: #e5e5e5;
      font-size: 12px;
    }
    h3 { color: #22c55e; margin: 0 0 12px; font-size: 14px; letter-spacing: 0.05em; }
    label { display: block; color: #888; font-size: 11px; margin-bottom: 4px; }
    input[type="text"] {
      width: 100%; margin-bottom: 10px; padding: 5px 6px;
      background: #1a1a1a; color: #e5e5e5; border: 1px solid #333;
      border-radius: 3px; font-family: inherit; font-size: 11px; outline: none;
    }
    input[type="text"]:focus { border-color: #22c55e; }
    button {
      background: #22c55e; color: #0a0a0a; border: none; padding: 6px 14px;
      border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600;
    }
    button:hover { background: #16a34a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 10px; font-size: 11px; color: #666; min-height: 16px; }
    #status.ok { color: #22c55e; }
    #status.err { color: #ef4444; }
    .divider { border: none; border-top: 1px solid #222; margin: 12px 0; }
    .info-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: #555; margin-top: 8px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #333; display: inline-block; margin-right: 4px; }
    .dot.active { background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .btn-outline {
      background: #1a1a1a; color: #22c55e; border: 1px solid #22c55e;
      padding: 6px 12px; cursor: pointer; width: 100%; font-family: inherit;
      font-size: 12px; border-radius: 3px; margin-top: 8px;
    }
    .btn-outline:hover { background: #22c55e22; }
    .btn-outline:disabled { opacity: 0.5; cursor: not-allowed; }
    .section-label {
      font-size: 11px; color: #555; text-transform: uppercase;
      letter-spacing: 0.08em; margin: 12px 0 6px;
    }
    .recording-bar {
      display: none; background: #1a0a0a; border: 1px solid #ef4444;
      border-radius: 3px; padding: 10px; margin-top: 8px;
    }
    .recording-bar.active { display: block; }
    .recording-header {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: #ef4444;
    }
    .rec-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #ef4444;
      animation: pulse 1s infinite;
    }
    .recording-counts {
      display: flex; justify-content: center; gap: 20px; margin: 10px 0;
    }
    .count-block { text-align: center; }
    .count-num { font-size: 20px; font-weight: 700; color: #e5e5e5; }
    .count-label { font-size: 10px; color: #666; }
  </style>
</head>
<body>
  <h3>CFFBRW Bridge</h3>

  <label>Gateway URL</label>
  <input id="gateway" type="text" placeholder="http://localhost:8787">

  <label>API Token (optional)</label>
  <input id="token" type="text" placeholder="wfk_...">

  <button id="save">Save</button>
  <div id="status"></div>

  <div class="section-label">Quick Compile</div>
  <button id="compile" class="btn-outline">Compile current page</button>

  <div class="section-label">Record & Compile</div>
  <button id="record-start" class="btn-outline">Start recording</button>

  <div id="recording-bar" class="recording-bar">
    <div class="recording-header">
      <span class="rec-dot"></span>
      <span>Recording...</span>
    </div>
    <div class="recording-counts">
      <div class="count-block">
        <div class="count-num" id="state-count">0</div>
        <div class="count-label">states</div>
      </div>
      <div class="count-block">
        <div class="count-num" id="action-count">0</div>
        <div class="count-label">actions</div>
      </div>
    </div>
    <button id="record-stop" style="background:#ef4444;color:#fff;width:100%;font-family:inherit;font-size:12px;border:none;padding:6px;border-radius:3px;cursor:pointer;font-weight:600">Stop & Compile</button>
  </div>

  <div id="schema-result" style="margin-top:8px;font-size:11px;display:none">
    <div style="color:#666">Tool Schema ID:</div>
    <input id="schema-id" readonly style="width:100%;background:#1a1a1a;color:#22c55e;border:1px solid #333;padding:4px;font-size:11px;font-family:inherit;border-radius:3px">
  </div>

  <hr class="divider">

  <div id="last-schema" style="display:none;font-size:11px">
    <div style="color:#555;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">Last Compiled</div>
    <div style="color:#888;font-size:10px;margin-bottom:2px">Tool Schema ID:</div>
    <input id="last-schema-id" readonly style="width:100%;background:#1a1a1a;color:#22c55e;border:1px solid #333;padding:4px;font-size:11px;font-family:inherit;border-radius:3px">
    <div style="color:#888;font-size:10px;margin:6px 0 2px">Recording ID:</div>
    <input id="last-recording-id" readonly style="width:100%;background:#1a1a1a;color:#60a5fa;border:1px solid #333;padding:4px;font-size:11px;font-family:inherit;border-radius:3px">
    <div id="last-schema-meta" style="color:#666;margin-top:4px"></div>
    <button id="recompile" class="btn-outline" style="margin-top:6px">Recompile from recording</button>
  </div>
  <div class="info-row">
    <span><span class="dot active" id="poll-dot"></span>Polling every 2s</span>
    <span id="last-poll" style="color:#444">—</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
